<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles/header.css">
    <link rel="stylesheet" href="/static/styles/footer.css">
    <link rel="stylesheet" href="/static/styles/historico.css">
    <title>Historico de Agendamentos</title>


</head>
<body>
    <header class="header-SangueSolidario">
        <div class="container">
            <div class="row py-3 align-items-center justify-content-between">
                <div class="col-4 d-flex align-items-center">
                    <img src="/static/assets/logoSangueSolidario.png" alt="SangueSolidario" class="me-2" style="max-height: 40px;">
                    <h2 class="mb-0 Logo">Sangue Solidario</h2>
                </div>
                <div class="col-8 text-end d-flex justify-content-around">
                    <a href="/PaginaInicialUsuario" class="px-2 links headerBotoes">Inicio</a>
                    <a href="/PaginaInicialUsuario#SobreProjeto" class="px-2 links headerBotoes">Quem Somos</a>
                    <a href="/paginaInicial/nossasUnidades" class="px-2 links headerBotoes">Onde Doar</a>
                    <a href="/PaginaInicialUsuario#Contato" class="px-2 links headerBotoes">Contato</a>
                </div>
            </div>
        </div>
    </header>

    <div class="pagina-historico">
        <h2 class="pagina-titulo">Historico de Agendamentos</h2>
        <div id="contador" class="contador"></div>
        <div id="listaAgendamentos"></div>
    </div>

    <div id="modalExcluir" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
        <div class="modal-box">
            <div class="modal-icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8B1C2B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                    <path d="M10 11v6"></path><path d="M14 11v6"></path>
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                </svg>
            </div>
            <div class="modal-titulo" id="modalTitulo">Excluir agendamento?</div>
            <div class="modal-desc">Esta ação não pode ser desfeita. O agendamento será removido permanentemente.</div>
            <div class="modal-botoes">
                <button class="btn-modal-cancelar" id="btnCancelarModal">Cancelar</button>
                <button class="btn-modal-confirmar" id="btnConfirmarExcluir">Excluir</button>
            </div>
        </div>
    </div>

    <script src="/static/scripts/auth.js"></script>
    <script src="/static/scripts/historico.js"></script>
</body>
</html>
