<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangue Solidário</title>

    <link rel="shortcut icon" href="/static/assets/logoSangueSolidario.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/styles/informacoes.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>
    <header class="header-SangueSolidario">
        <div class="container">
            <div class="row py-3 align-items-center justify-content-between">
                <div class="col-4 d-flex align-items-center">
                    <img src="/static/assets/logoSangueSolidario.png" alt="SangueSolidario" class="me-2"
                        style="max-height: 40px;">
                    <h2 class="mb-0 Logo">Sangue Solidário</h2>
                </div>
                <div class="col-8 text-end d-flex justify-content-around">
                    <a href="/PaginaInicialUsuario" class="px-2 links headerBotoes">Início</a>
                    <a href="#SobreProjeto" class="px-2 links headerBotoes">Quem Somos</a>
                    <a href="/paginaInicial/nossasUnidades" class="px-2 links headerBotoes">Onde Doar</a>
                    <a href="#Contato" class="px-2 links headerBotoes">Contato</a>
                    <a href="/usuario/meuPerfil" class="px-2 links headerBotoes">Meu perfil</a>
                </div>
            </div>
        </div>
    </header>

    <div class="texto-topo m-4">
        <h1 class="d-flex justify-content-center">Informações obtidas:</h1>
        <p class="d-flex justify-content-center">Suas informações estão corretas?</p>
    </div>

    <div class="info-wrapper">
        <div class="info-card">
            <div class="info-row">
                <div class="info-icon">📍</div>
                <div>
                    <span class="info-label">Unidade de doação</span>
                    <span class="info-value" id="info-unidade">—</span>
                </div>
            </div>
            <hr>
            <div class="info-row">
                <div class="info-icon">📅</div>
                <div>
                    <span class="info-label">Data agendada</span>
                    <span class="info-value" id="info-data">—</span>
                </div>
            </div>
            <hr>
            <div class="info-row">
                <div class="info-icon">🕒</div>
                <div>
                    <span class="info-label">Horário agendado</span>
                    <span class="info-value" id="info-hora">—</span>
                </div>
            </div>
        </div>
        <div class="d-flex justify-content-center gap-3 mt-3">
            <button id="cancel-btn">Cancelar</button>
            <button id="edit-btn">Editar</button>
            <button id="confirm-btn">Confirmar agendamento</button>
        </div>
    </div>

    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/scripts/informacoes.js"></script>
</body>

</html>
