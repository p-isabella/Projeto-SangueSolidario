<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/styles/header.css">
    <link rel="stylesheet" href="/static/styles/login.css">
    <title>Login</title>
</head>

<body>
    <header class="header-SangueSolidario">
        <div class="container">
            <div class="row py-3 align-items-center justify-content-between">
                <div class="col-4 d-flex align-items-center">
                    <img src="/static/assets/logoSangueSolidario.png" alt="SangueSolidario" class="me-2"
                        style="max-height: 40px;">
                    <h2 class="mb-0 Logo">Sangue Solidário</h2>
                </div>
                <div class="col-8 text-end d-flex justify-content-around">
                    <a href="/" class="px-2 links headerBotoes">Início</a>
                    <a href="/#SobreProjeto" class="px-2 links headerBotoes">Quem Somos</a>
                    <a href="/paginaInicial/nossasUnidades" class="px-2 links headerBotoes">Onde Doar</a>
                    <a href="/#Contato" class="px-2 links headerBotoes">Contato</a>
                    <a href="/paginaInicial/Cadastro" class="px-2 links headerBotoes">Login/Cadastro</a>
                </div>
            </div>
        </div>
    </header>

    <div id="BotaoVoltar" class="position-sticky m-4" style="width: 50px; flex-shrink: 0;">
        <a href="/">
            <svg xmlns="http://www.w3.org/2000/svg" width="33" height="50" viewBox="0 0 33 50" fill="none">
                <path d="M29.8205 47.5L3.8205 25.2557L29.8205 2.5" stroke="#8B1C2B" stroke-width="5"
                    stroke-linecap="round" />
            </svg>
        </a>
    </div>
    <div class="container-fluid cadastro d-flex flex-column align-items-center p-0">

        <div class="row py-2">
            <button class="col button"><a href="/paginaInicial/Cadastro">Cadastro</a></button>
            <button class="col button" id="butaoAtivo">Login</button>
        </div>

        <form class="formulario">
            <section class="row">
                <div class="col">
                    <label for="email">E-mail:</label><br>
                    <input required type="text" id="email"><br>

                    <label for="entrar_senha">Entre com sua senha:</label><br>
                    <input required type="password" id="entrar_senha"><br>

                    <div class="row">
                        <button class="button" type="submit" id="envioDadosLogin">Entrar</button>
                    </div>
                </div>
            </section>
        </form>
        <div id="Aviso"></div>
    </div>

    <script src="/static/scripts/login.js"></script>
</body>

</html>
