<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangue Solidário</title>

    <link rel="shortcut icon" href="/static/assets/logoSangueSolidario.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/styles/local.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="/static/scripts/verificaSessao.js"></script>
</head>

<body>
    <header class="header-SangueSolidario">
        <div class="container">
            <div class="row py-3 align-items-center justify-content-between">
                <div class="col-4 d-flex align-items-center">
                    <img src="/static/assets/logoSangueSolidario.png" alt="SangueSolidario" class="me-2"
                        style="max-height: 40px;">
                    <h2 class="mb-0 Logo">Sangue Solidário</h2>
                </div>
                <div class="col-8 text-end d-flex justify-content-around">
                    <a href="/" class="px-2 links headerBotoes">Início</a>
                    <a href="#SobreProjeto" class="px-2 links headerBotoes">Quem Somos</a>
                    <a href="/paginaInicial/nossasUnidades" class="px-2 links headerBotoes">Onde Doar</a>
                    <a href="#Contato" class="px-2 links headerBotoes">Contato</a>
                    <a href="/usuario/meuPerfil" class="px-2 links headerBotoes">Meu perfil</a>
                </div>
            </div>
        </div>
    </header>

        <div class="texto-topo m-4">
            <h1 class="d-flex justify-content-center">Selecione a unidade de doação:</h1>
            <p class="d-flex justify-content-center">Vamos continuar com seu agendamento</p>
        </div>
        <div class="card-wrapper">
            <div class="card p-4">
                <div class="d-flex align-items-center justify-content-center gap-4">
                    <div class="unidade-imagem-wrapper">
                        <div class="unidade-placeholder" id="unidade-placeholder">
                            <span>Selecione uma unidade</span>
                        </div>
                        <img id="unidade-img" class="unidade-img d-none" src="" alt="Imagem da unidade">
                    </div>
                    <div class="flex-grow-1">
                        <h4>Selecione a unidade:</h4>
                        <div class="dropdown">
                            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                                aria-expanded="false" id="dropdown-label">
                                Unidades disponíveis
                            </button>
                            <ul class="dropdown-menu">
                                <li><button class="dropdown-item unidade-btn" data-img="/static/assets/centro1.png" data-label="SHH SJC">Serviço de Hematologia e Hemoterapia (SJC)</button></li>
                                <li><button class="dropdown-item unidade-btn" data-img="/static/assets/centro2.png" data-label="Hemocentro de Taubaté">Hemocentro de Taubaté</button></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-8 local-confirm d-flex justify-content-center">
            <button class="mb-4" id="confirm-btn" disabled>Confirmar</button>
        </div>

    <footer>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/scripts/local.js"></script>
</body>

</html>
