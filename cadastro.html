<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/cadastro.css">
    <title>Cadastro</title>
</head>

<body>
    <header class="header-SangueSolidario">
        <div class="container">
            <div class="row py-3 align-items-center justify-content-between">
                <div class="col-4 d-flex align-items-center">
                    <img src="assets/logoSangueSolidario.png" alt="SangueSolidario" class="me-2"
                        style="max-height: 40px;">
                    <h2 class="mb-0 Logo">Sangue Solidário</h2>
                </div>
                <div class="col-8 text-end d-flex justify-content-around">
                    <a href="index.html" class="px-2 links headerBotoes">Início</a>
                    <a href="index.html#SobreProjeto" class="px-2 links headerBotoes">Quem Somos</a>
                    <a href="NossasUnidades.html" class="px-2 links headerBotoes">Onde Doar</a>
                    <a href="index.html#Contato" class="px-2 links headerBotoes">Contato</a>
                    <a href="cadastro.html" class="px-2 links headerBotoes">Login/Cadastro</a>
                </div>
            </div>
        </div>
    </header>

    <div id="BotaoVoltar" class="position-sticky m-4" style="width: 50px; flex-shrink: 0;">
        <a href="/index.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="33" height="50" viewBox="0 0 33 50" fill="none">
                <path d="M29.8205 47.5L3.8205 25.2557L29.8205 2.5" stroke="#8B1C2B" stroke-width="5"
                    stroke-linecap="round" />
            </svg>
        </a>
    </div>
    <div class="container-fluid cadastro d-flex flex-column align-items-center p-0">

        <div class="row py-2">
            <button class="col button" id="butaoAtivo">Cadastro</button>
            <button class="col button"><a href="login.html">Login</a></button>
        </div>

        <form class="formulario">
            <section class="row">
                <div class="col">
                    <label for="nome_completo">Nome Completo:</label><br>
                    <input type="text" id="nome_completo"><br>

                    <label for="cpf">CPF:</label><br>
                    <input type="text" id="cpf"><br>

                    <label for="tipo_sanguineo">Tipo Sanguíneo:</label><br>
                    <input type="text" id="tipo_sanguineo"><br>

                    <label for="data_nascimento">Data de Nascimento:</label><br>
                    <input type="text" id="data_nascimento"><br>

                </div>

                <div class="col">
                    <label for="cep">CEP:</label><br>
                    <input type="text" id="cep"><br>

                    <label for="email">E-mail:</label><br>
                    <input type="text" id="email"><br>

                    <label for="criar_senha">Crie sua senha:</label><br>
                    <input type="text" id="criar_senha"><br>

                    <label for="confirme_senha">Confirme sua senha:</label><br>
                    <input type="text" id="confirme_senha"><br>
                </div>
            </section>
        </form>

        <div class="row"><input class="button" type="submit" value="Criar"></div>

    </div>


</body>

</html>
