<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangue Solidário</title>

    <link rel="shortcut icon" href="assets/logoSangueSolidario.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/calendario.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>
    <header class="header-SangueSolidario">
        <div class="container">
            <div class="row py-3 align-items-center justify-content-between">
                <div class="col-4 d-flex align-items-center">
                    <img src="assets/logoSangueSolidario.png" alt="SangueSolidario" class="me-2"
                        style="max-height: 40px;">
                    <h2 class="mb-0 Logo">Sangue Solidário</h2>
                </div>
                <div class="col-8 text-end d-flex justify-content-around">
                    <a href="index.html" class="px-2 links headerBotoes">Início</a>
                    <a href="#SobreProjeto" class="px-2 links headerBotoes">Quem Somos</a>
                    <a href="NossasUnidades.html" class="px-2 links headerBotoes">Onde Doar</a>
                    <a href="#Contato" class="px-2 links headerBotoes">Contato</a>
                    <a href="#" class="px-2 links headerBotoes">Login/Cadastro</a>
                </div>
            </div>
        </div>
    </header>

    <div class="texto-topo m-4">
        <h1 class="d-flex justify-content-center">Datas disponíveis:</h1>
        <p class="d-flex justify-content-center">Vamos continuar com seu agendamento</p>
    </div>

    <div class="calendar justify-content-center">
        <div class="calendar-header">
            <button id="prev-month"><</button>
            <div id="month-year"></div>
            <button id="next-month">></button>
        </div>
        <div class="calendar-body">
            <div class="calendar-weekdays">
                <div>D</div>
                <div>S</div>
                <div>T</div>
                <div>Q</div>
                <div>Q</div>
                <div>S</div>
                <div>S</div>
            </div>
            <div class="calendar-dates">

            </div>
        </div>
        <div class="calendar-confirm">
            <p id="selected-date-display">Nenhuma data selecionada.</p>
        </div>
    </div>

    <div class="time-slot-panel" id="time-slot-panel">
        <div class="time-slot-header" id="time-slot-title">Horários disponíveis</div>
        <div class="time-slot-grid" id="time-slot-grid"></div>
        <div class="time-slot-confirm">
            <p id="selected-time-display">Selecione um horário.</p>
            <button id="confirm-btn" disabled>Confirmar Agendamento</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/calendario.js"></script>
</body>

</html>
